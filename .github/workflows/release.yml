name: Release modpack + deploy to server

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag override (sem v); usado quando dispara manualmente'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version
        id: pack
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          elif [[ -n "${{ inputs.tag }}" ]]; then
            TAG="v${{ inputs.tag }}"
          else
            TAG="dev-${GITHUB_SHA::8}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG / Version: $VERSION"

      - name: Safety check — refuse empty mods folder
        run: |
          MODS_COUNT=$(find mods -name '*.jar' -type f 2>/dev/null | wc -l)
          if [[ "$MODS_COUNT" -eq 0 ]]; then
            echo "::error::mods/ não contém nenhum .jar — abortando antes de deletar mods do servidor"
            exit 1
          fi
          echo "Encontrados $MODS_COUNT mod jars pra deployar"

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y lftp jq zip

      - name: Update manifest version
        run: |
          jq --arg v "${{ steps.pack.outputs.version }}" '.version = $v' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json
          cat manifest.json

      - name: Build modpack.zip
        run: |
          mkdir -p dist
          zip -r dist/modpack.zip mods/ config/ manifest.json -x '*/.gitkeep' '*.DS_Store'
          ls -la dist/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/modpack.zip
          tag_name: ${{ steps.pack.outputs.tag }}
          name: Modpack ${{ steps.pack.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: AMP login → session
        id: amp
        env:
          AMP_URL: ${{ secrets.AMP_URL }}
          AMP_USER: ${{ secrets.AMP_USER }}
          AMP_PASS: ${{ secrets.AMP_PASS }}
          AMP_INSECURE: ${{ secrets.AMP_INSECURE }}
        run: |
          # Strip trailing slash from URL
          URL="${AMP_URL%/}/API/Core/Login"
          echo "POST → $URL"

          # If AMP uses self-signed TLS, set the AMP_INSECURE secret to "true"
          CURL_OPTS=("-sS" "-L" "--connect-timeout" "10" "--max-time" "30")
          if [[ "${AMP_INSECURE,,}" == "true" ]]; then
            CURL_OPTS+=("-k")
            echo "AMP_INSECURE=true → pulando verificação TLS"
          fi

          BODY=$(jq -nc --arg u "$AMP_USER" --arg p "$AMP_PASS" \
            '{username:$u, password:$p, token:"", rememberMe:false}')

          set +e
          HTTP_CODE=$(curl "${CURL_OPTS[@]}" -o /tmp/amp-login.txt -w "%{http_code}" \
            -X POST "$URL" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data "$BODY")
          CURL_EXIT=$?
          set -e

          echo "curl exit=$CURL_EXIT  HTTP status=$HTTP_CODE"

          if [[ "$CURL_EXIT" -ne 0 ]]; then
            echo "::error::curl falhou com exit code $CURL_EXIT (timeout, DNS, ou TLS — confira AMP_URL e AMP_INSECURE)"
            echo "--- resposta parcial (até 1KB) ---"
            head -c 1024 /tmp/amp-login.txt || true
            exit 1
          fi

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::error::AMP login retornou HTTP $HTTP_CODE (esperava 200)"
            echo "--- resposta (até 1KB) ---"
            head -c 1024 /tmp/amp-login.txt
            exit 1
          fi

          # Validate JSON before parsing
          if ! jq -e . /tmp/amp-login.txt >/dev/null 2>&1; then
            echo "::error::AMP retornou status 200 mas conteúdo não é JSON. Provável: URL aponta pra página HTML do painel (use a URL do ADS API se for multi-instance) ou redirect pra /Login que renderiza HTML."
            echo "--- primeiros 500 chars ---"
            head -c 500 /tmp/amp-login.txt
            exit 1
          fi

          # AMP returns success boolean — surface helpful error if false
          SUCCESS=$(jq -r '.success // empty' /tmp/amp-login.txt)
          if [[ "$SUCCESS" == "false" ]]; then
            echo "::error::AMP rejeitou as credenciais (success=false)"
            jq -c . /tmp/amp-login.txt
            exit 1
          fi

          SID=$(jq -r '.sessionID // empty' /tmp/amp-login.txt)
          if [[ -z "$SID" ]]; then
            echo "::error::Login retornou JSON mas sem sessionID"
            jq -c . /tmp/amp-login.txt
            exit 1
          fi

          echo "::add-mask::$SID"
          echo "sid=$SID" >> "$GITHUB_OUTPUT"
          echo "AMP login OK"

      - name: Stop AMP server
        env:
          AMP_URL: ${{ secrets.AMP_URL }}
          AMP_INSECURE: ${{ secrets.AMP_INSECURE }}
          SID: ${{ steps.amp.outputs.sid }}
        run: |
          URL="${AMP_URL%/}/API/Core/Stop"
          CURL_OPTS=("-sS" "-L" "--connect-timeout" "10" "--max-time" "30")
          if [[ "${AMP_INSECURE,,}" == "true" ]]; then CURL_OPTS+=("-k"); fi
          BODY=$(jq -nc --arg s "$SID" '{SESSIONID:$s}')
          curl "${CURL_OPTS[@]}" -X POST "$URL" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data "$BODY" || true
          echo "Aguardando 25s pro servidor parar limpinho…"
          sleep 25

      - name: Mirror mods + config via SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          # lftp reads the password from $LFTP_PASSWORD via --env-password.
          # This avoids any shell/lftp-parser interpolation of chars like
          # #, ;, ?, , or \ that exist in the password.
          LFTP_PASSWORD: ${{ secrets.SFTP_PASS }}
        run: |
          lftp --env-password \
            -u "$SFTP_USER" \
            -p "$SFTP_PORT" \
            "sftp://$SFTP_HOST" \
            -e "
              set sftp:auto-confirm yes;
              set net:max-retries 3;
              set net:reconnect-interval-base 5;
              set net:timeout 30;
              mirror --reverse --delete --verbose --parallel=4 --exclude-glob .gitkeep mods/ /mods/;
              mirror --reverse --delete --verbose --parallel=4 --exclude-glob .gitkeep config/ /config/;
              bye
            "

      - name: Start AMP server
        if: always() && steps.amp.outputs.sid != ''
        env:
          AMP_URL: ${{ secrets.AMP_URL }}
          AMP_INSECURE: ${{ secrets.AMP_INSECURE }}
          SID: ${{ steps.amp.outputs.sid }}
        run: |
          URL="${AMP_URL%/}/API/Core/Start"
          CURL_OPTS=("-sS" "-L" "--connect-timeout" "10" "--max-time" "30")
          if [[ "${AMP_INSECURE,,}" == "true" ]]; then CURL_OPTS+=("-k"); fi
          BODY=$(jq -nc --arg s "$SID" '{SESSIONID:$s}')
          curl "${CURL_OPTS[@]}" -X POST "$URL" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data "$BODY"
          echo "Servidor iniciado. Pode demorar uns 30-60s pra carregar todo o modpack."
